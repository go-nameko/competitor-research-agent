<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경쟁사 리서치 에이전트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a33;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --accent3: #6af7c8;
    --text: #e8e8f0;
    --text-muted: #888899;
    --text-dim: #555566;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
  }

  header span {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
    margin-left: auto;
  }

  .app {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 61px);
  }

  .sidebar {
    width: 290px;
    border-right: 1px solid var(--border);
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 22px;
    overflow-y: auto;
    background: var(--surface);
    flex-shrink: 0;
  }

  .section-label {
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  input[type="text"], textarea {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    width: 100%;
  }

  input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
  input[type="text"]::placeholder, textarea::placeholder { color: var(--text-dim); }

  .tag-row { display: flex; flex-wrap: wrap; gap: 5px; }

  .tag {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .tag:hover { border-color: var(--accent); color: var(--accent); }
  .tag.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .competitor-list { display: flex; flex-direction: column; gap: 5px; }

  .competitor-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 10px;
    font-size: 13px;
  }

  .competitor-item .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .competitor-item span { flex: 1; }
  .competitor-item .remove { color: var(--text-dim); cursor: pointer; font-size: 16px; line-height: 1; }
  .competitor-item .remove:hover { color: var(--accent2); }

  .add-competitor { display: flex; gap: 5px; margin-top: 6px; }
  .add-competitor input { flex: 1; }

  .btn-sm {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    padding: 8px 12px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    white-space: nowrap;
  }

  .run-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  .run-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .run-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .tab-bar {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    background: var(--surface);
    gap: 2px;
  }

  .tab {
    padding: 13px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .content { flex: 1; overflow-y: auto; padding: 26px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 14px;
    color: var(--text-dim);
    text-align: center;
    min-height: 300px;
  }

  .empty-icon { font-size: 44px; opacity: 0.4; }

  .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 17px; color: var(--text-muted); }
  .empty-state p { font-size: 13px; max-width: 280px; line-height: 1.6; }

  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 300px;
    gap: 18px;
  }

  .loader-ring {
    width: 44px; height: 44px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-steps { display: flex; flex-direction: column; gap: 6px; text-align: center; }

  .loading-steps .step {
    font-size: 13px;
    color: var(--text-dim);
    opacity: 0;
    animation: fadeIn 0.4s forwards;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  .result-section {
    margin-bottom: 32px;
    animation: slideUp 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-section:nth-child(1) { animation-delay: 0.05s; }
  .result-section:nth-child(2) { animation-delay: 0.12s; }

  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .badge {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .badge-purple { background: rgba(124,106,247,0.2); color: var(--accent); }
  .badge-pink { background: rgba(247,106,138,0.2); color: var(--accent2); }
  .badge-green { background: rgba(106,247,200,0.2); color: var(--accent3); }

  .compare-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .compare-table th {
    background: var(--surface2);
    padding: 11px 14px;
    text-align: left;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }

  .compare-table td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    line-height: 1.5;
    vertical-align: middle;
  }

  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table tr:hover td { background: rgba(124,106,247,0.04); }
  .compare-table td:first-child { font-weight: 500; color: var(--text-muted); white-space: nowrap; }

  .check { color: #6af7c8; }
  .cross { color: #f76a8a; opacity: 0.7; }
  .partial { color: #f7c26a; }

  .pattern-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }

  .pattern-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    transition: border-color 0.2s;
  }

  .pattern-card:hover { border-color: var(--accent); }

  .pattern-card-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .pattern-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    flex-shrink: 0;
  }

  .pattern-card h4 { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
  .pattern-card p { font-size: 12px; color: var(--text-muted); line-height: 1.6; margin-bottom: 8px; }

  .pattern-companies { display: flex; flex-wrap: wrap; gap: 4px; }

  .company-chip {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
  }

  .bench-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    margin-bottom: 18px;
  }

  .bench-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px;
  }

  .bench-card-name {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .score-row { display: flex; flex-direction: column; gap: 7px; }

  .score-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .score-label { color: var(--text-muted); width: 80px; flex-shrink: 0; }

  .score-bar-wrap {
    flex: 1;
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .score-bar { height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(0.4,0,0.2,1); }
  .score-num { font-weight: 600; color: var(--text); width: 26px; text-align: right; font-size: 11px; }

  .insights-list { display: flex; flex-direction: column; gap: 8px; }

  .insight-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-muted);
  }

  .summary-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-muted);
    margin-bottom: 18px;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">🔍</div>
  <h1>경쟁사 리서치 에이전트</h1>
  <span>AI Powered</span>
</header>

<div class="app">
  <aside class="sidebar">
    <div>
      <div class="section-label">내 서비스</div>
      <input type="text" id="myProduct" placeholder="예: 토스, 카카오페이..." style="margin-bottom:6px" />
      <textarea id="myDesc" rows="2" placeholder="서비스 설명 (선택)&#10;예: 간편 송금 핀테크 앱"></textarea>
    </div>

    <div>
      <div class="section-label">경쟁사</div>
      <div class="competitor-list" id="competitorList"></div>
      <div class="add-competitor">
        <input type="text" id="newCompetitor" placeholder="경쟁사 추가..." />
        <button class="btn-sm" onclick="addCompetitor()">추가</button>
      </div>
    </div>

    <div>
      <div class="section-label">분석 항목</div>
      <div class="tag-row" id="analysisTypes">
        <div class="tag active" data-val="ux">UX/UI 패턴</div>
        <div class="tag active" data-val="feature">기능 비교</div>
        <div class="tag active" data-val="bench">벤치마킹</div>
        <div class="tag" data-val="onboarding">온보딩</div>
        <div class="tag" data-val="nav">내비게이션</div>
      </div>
    </div>

    <div>
      <div class="section-label">분석 깊이</div>
      <div class="tag-row" id="depthTags">
        <div class="tag" data-depth="quick">빠른 요약</div>
        <div class="tag active" data-depth="standard">표준</div>
        <div class="tag" data-depth="deep">심층 분석</div>
      </div>
    </div>

    <button class="run-btn" id="runBtn" onclick="runAnalysis()">✦ 분석 시작</button>
  </aside>

  <div class="main">
    <div class="tab-bar">
      <div class="tab active" onclick="switchTab(this,'ux')">UX/UI 패턴</div>
      <div class="tab" onclick="switchTab(this,'feature')">기능 비교표</div>
      <div class="tab" onclick="switchTab(this,'bench')">벤치마킹</div>
    </div>
    <div class="content" id="mainContent">
      <div class="empty-state">
        <div class="empty-icon">🧭</div>
        <h3>분석 준비 완료</h3>
        <p>내 서비스와 경쟁사를 입력하고<br>분석 시작을 눌러주세요.</p>
      </div>
    </div>
  </div>
</div>

<script>
  let competitors = ['당근마켓', '번개장터'];
  let selectedTypes = new Set(['ux', 'feature', 'bench']);
  let selectedDepth = 'standard';
  let currentTab = 'ux';
  let resultData = null;

  renderCompetitors();

  document.querySelectorAll('#analysisTypes .tag').forEach(tag => {
    tag.addEventListener('click', () => {
      const val = tag.dataset.val;
      if (selectedTypes.has(val)) {
        if (selectedTypes.size > 1) { selectedTypes.delete(val); tag.classList.remove('active'); }
      } else {
        selectedTypes.add(val); tag.classList.add('active');
      }
    });
  });

  document.querySelectorAll('#depthTags .tag').forEach(tag => {
    tag.addEventListener('click', () => {
      document.querySelectorAll('#depthTags .tag').forEach(t => t.classList.remove('active'));
      tag.classList.add('active');
      selectedDepth = tag.dataset.depth;
    });
  });

  function renderCompetitors() {
    const colors = ['#7c6af7','#f76a8a','#6af7c8','#f7c26a','#6aadf7'];
    document.getElementById('competitorList').innerHTML = competitors.map((c, i) => `
      <div class="competitor-item">
        <div class="dot" style="background:${colors[i % colors.length]}"></div>
        <span>${c}</span>
        <span class="remove" onclick="removeCompetitor(${i})">×</span>
      </div>
    `).join('');
  }

  function addCompetitor() {
    const input = document.getElementById('newCompetitor');
    const val = input.value.trim();
    if (val && !competitors.includes(val)) {
      competitors.push(val); renderCompetitors(); input.value = '';
    }
  }

  document.getElementById('newCompetitor').addEventListener('keypress', e => {
    if (e.key === 'Enter') addCompetitor();
  });

  function removeCompetitor(idx) {
    competitors.splice(idx, 1); renderCompetitors();
  }

  function switchTab(el, tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentTab = tab;
    if (resultData) renderTabContent(tab);
  }

  async function runAnalysis() {
    const myProduct = document.getElementById('myProduct').value.trim() || '내 서비스';
    const myDesc = document.getElementById('myDesc').value.trim();
    if (competitors.length === 0) { alert('경쟁사를 최소 1개 이상 입력해주세요.'); return; }

    const btn = document.getElementById('runBtn');
    btn.disabled = true; btn.textContent = '분석 중...';

    const content = document.getElementById('mainContent');
    const steps = ['경쟁사 데이터 수집 중...','UX 패턴 분석 중...','비교표 생성 중...','인사이트 도출 중...'];
    content.innerHTML = `
      <div class="loading-state">
        <div class="loader-ring"></div>
        <div class="loading-steps">
          ${steps.map((s, i) => `<div class="step" style="animation-delay:${i*0.7}s">${s}</div>`).join('')}
        </div>
      </div>`;

    const depthMap = { quick: '간략하게', standard: '표준 수준으로', deep: '매우 상세하게' };
    const competitorList = competitors.join(', ');
    const competitorObj = competitors.reduce((acc, c) => { acc[c] = '있음/없음/부분 중 하나'; return acc; }, {});

    const prompt = `당신은 UX 리서처입니다. 아래 정보로 경쟁사 분석을 ${depthMap[selectedDepth]} 수행하세요.

내 서비스: ${myProduct}${myDesc ? '\n서비스 설명: ' + myDesc : ''}
경쟁사: ${competitorList}

오직 JSON만 반환하세요. 마크다운 없이.

{
  "summary": "전체 분석 요약 2-3문장",
  "uxPatterns": [
    {"icon":"이모지","name":"패턴명","description":"UX 의미와 영향","companies":["회사명"],"color":"#hex"}
  ],
  "featureComparison": [
    {"feature":"기능명","myProduct":"있음|없음|부분","competitors":${JSON.stringify(competitorObj)},"importance":"높음|중간|낮음"}
  ],
  "benchmarking": [
    {"company":"회사명","scores":{"사용성":0~100,"온보딩":0~100,"기능성":0~100,"디자인":0~100,"퍼포먼스":0~100},"strengths":"핵심 강점","weakness":"핵심 약점"}
  ],
  "insights": ["인사이트1","인사이트2","인사이트3"]
}

featureComparison은 6~8개, uxPatterns는 4~6개, benchmarking에는 경쟁사 전체(${competitorList}) 포함. 각 서비스의 실제 특성 반영.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();
      const text = data.content.map(i => i.text || '').join('');
      const clean = text.replace(/```json|```/g, '').trim();
      resultData = JSON.parse(clean);
      resultData._myProduct = myProduct;
      resultData._competitors = [...competitors];
      renderTabContent(currentTab);
    } catch (err) {
      content.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>오류가 발생했습니다</h3><p>잠시 후 다시 시도해주세요.</p></div>`;
    }

    btn.disabled = false; btn.textContent = '✦ 분석 시작';
  }

  function renderTabContent(tab) {
    if (!resultData) return;
    const content = document.getElementById('mainContent');

    if (tab === 'ux') {
      content.innerHTML = `
        <div class="result-section">
          <div class="result-title">UX/UI 패턴 분석 <span class="badge badge-purple">AI 분석</span></div>
          <div class="summary-box">${resultData.summary || ''}</div>
          <div class="pattern-grid">
            ${(resultData.uxPatterns || []).map(p => `
              <div class="pattern-card">
                <div class="pattern-card-header">
                  <div class="pattern-icon" style="background:${p.color || '#7c6af7'}22">${p.icon || '✦'}</div>
                  <h4>${p.name}</h4>
                </div>
                <p>${p.description}</p>
                <div class="pattern-companies">${(p.companies||[]).map(c=>`<span class="company-chip">${c}</span>`).join('')}</div>
              </div>`).join('')}
          </div>
        </div>
        <div class="result-section">
          <div class="result-title">핵심 인사이트 <span class="badge badge-green">액션 아이템</span></div>
          <div class="insights-list">${(resultData.insights||[]).map(i=>`<div class="insight-item">${i}</div>`).join('')}</div>
        </div>`;
    }

    else if (tab === 'feature') {
      const allC = resultData._competitors || [];
      content.innerHTML = `
        <div class="result-section">
          <div class="result-title">기능 비교표 <span class="badge badge-pink">비교 분석</span></div>
          <table class="compare-table">
            <thead><tr>
              <th>기능</th>
              <th>${resultData._myProduct || '내 서비스'}</th>
              ${allC.map(c=>`<th>${c}</th>`).join('')}
              <th>중요도</th>
            </tr></thead>
            <tbody>
              ${(resultData.featureComparison||[]).map(row=>`
                <tr>
                  <td>${row.feature}</td>
                  <td>${renderStatus(row.myProduct)}</td>
                  ${allC.map(c=>`<td>${renderStatus(row.competitors?.[c]||'—')}</td>`).join('')}
                  <td><span style="font-size:11px;padding:2px 8px;border-radius:20px;background:${impBg(row.importance)};color:${impColor(row.importance)}">${row.importance||'—'}</span></td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    }

    else if (tab === 'bench') {
      const colors = ['#7c6af7','#f76a8a','#6af7c8','#f7c26a','#6aadf7'];
      content.innerHTML = `
        <div class="result-section">
          <div class="result-title">벤치마킹 보고서 <span class="badge badge-green">종합 평가</span></div>
          <div class="bench-grid">
            ${(resultData.benchmarking||[]).map((item,idx)=>`
              <div class="bench-card">
                <div class="bench-card-name">
                  <div style="width:9px;height:9px;border-radius:50%;background:${colors[idx%colors.length]};flex-shrink:0"></div>
                  ${item.company}
                </div>
                <div class="score-row">
                  ${Object.entries(item.scores||{}).map(([label,score])=>`
                    <div class="score-item">
                      <span class="score-label">${label}</span>
                      <div class="score-bar-wrap"><div class="score-bar" style="width:${score}%;background:${colors[idx%colors.length]}99"></div></div>
                      <span class="score-num">${score}</span>
                    </div>`).join('')}
                </div>
                ${item.strengths?`<div style="margin-top:10px;font-size:12px;color:var(--text-muted)">✦ ${item.strengths}</div>`:''}
                ${item.weakness?`<div style="margin-top:3px;font-size:12px;color:var(--text-dim)">✕ ${item.weakness}</div>`:''}
              </div>`).join('')}
          </div>
        </div>`;
    }
  }

  function renderStatus(val) {
    if (!val || val === '—') return '<span style="color:var(--text-dim)">—</span>';
    if (val === '있음') return '<span class="check">✓ 있음</span>';
    if (val === '없음') return '<span class="cross">✕ 없음</span>';
    if (val === '부분') return '<span class="partial">◑ 부분</span>';
    return `<span style="color:var(--text-muted);font-size:12px">${val}</span>`;
  }

  function impBg(v) {
    if (v === '높음') return 'rgba(247,106,138,0.15)';
    if (v === '중간') return 'rgba(247,194,106,0.15)';
    return 'rgba(106,247,200,0.15)';
  }

  function impColor(v) {
    if (v === '높음') return '#f76a8a';
    if (v === '중간') return '#f7c26a';
    return '#6af7c8';
  }
</script>
</body>
</html>
